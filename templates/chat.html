<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Private Chat - Secure real-time messaging for two">
    <title>Private Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="terminal-chat-container">
        <!-- ===== Header ===== -->
        <header class="terminal-header">
            <div class="terminal-header-info">
                <span>[Connected: <span id="other-username" class="terminal-username">{{ current_user }}</span>]</span>
                <span id="header-status" class="terminal-status">ONLINE</span>
                <span id="status-dot" class="hidden online"></span> <!-- Hidden element for call.js logic -->
            </div>
            <div class="terminal-header-actions">
                <button id="audio-call-btn" class="terminal-btn">[AUDIO CALL]</button>
                <button id="video-call-btn" class="terminal-btn">[VIDEO CALL]</button>
                <a href="{{ url_for('logout') }}" class="terminal-btn">[LOGOUT]</a>
            </div>
        </header>

        <!-- ===== Search Area ===== -->
        <div class="terminal-search">
            <label for="search-input">search></label>
            <input type="text" id="search-input" class="terminal-input" placeholder="Query DB..." autocomplete="off">
            <button id="search-close-btn" class="terminal-btn hidden">[X]</button>
        </div>

        <!-- ===== Chat History ===== -->
        <main class="terminal-messages" id="messages-container">
            <!-- Messages render here in terminal format -->
        </main>

        <!-- ===== Typing Indicator ===== -->
        <div class="terminal-typing-indicator hidden" id="typing-indicator">
            > User is typing...
        </div>

        <!-- ===== Reply Context ===== -->
        <div id="reply-context" class="terminal-reply-context hidden">
            <span>[Replying to <span id="reply-context-sender"></span>: <span id="reply-context-text"></span>]</span>
            <button id="cancel-reply-btn" class="terminal-btn">[CANCEL]</button>
        </div>

        <!-- ===== Input Area ===== -->
        <footer class="terminal-input-area">
            <label for="message-input" class="prompt">C:\Chat></label>
            <input type="text" id="message-input" class="terminal-input" placeholder="Enter command/message..." autocomplete="off" autofocus>
            <button id="send-btn" class="terminal-btn">[SEND]</button>
        </footer>

        <!-- ===== Incoming Call Overlay ===== -->
        <div class="terminal-modal" id="incoming-call-overlay">
            <div class="terminal-modal-content">
                <p>> INCOMING <span id="incoming-call-type"></span> CALL FROM <span id="incoming-caller-name"></span>...</p>
                <div class="terminal-modal-actions">
                    <button id="accept-call-btn" class="terminal-btn">[ACCEPT]</button>
                    <button id="reject-call-btn" class="terminal-btn">[REJECT]</button>
                </div>
            </div>
        </div>

        <!-- ===== Active Call Screen ===== -->
        <div class="terminal-modal" id="active-call-screen">
            <div class="terminal-modal-content">
                <p>> ACTIVE CALL WITH <span id="call-user-name"></span></p>
                <p>> STATUS: <span id="call-status">Connecting...</span></p>
                <p>> TIME: <span id="call-timer">00:00</span></p>
                <div class="video-container">
                    <video id="remote-video" autoplay playsinline></video>
                    <video id="local-video" autoplay playsinline muted></video>
                </div>
                <div class="terminal-modal-actions">
                    <button id="mute-btn" class="terminal-btn">[MUTE]</button>
                    <button id="camera-btn" class="terminal-btn">[CAMERA]</button>
                    <button id="end-call-btn" class="terminal-btn">[END CALL]</button>
                </div>
            </div>
        </div>
    </div>



    <!-- ===== Pass data to JavaScript ===== -->
    <script>
        const CURRENT_USER = {{ current_user | tojson }};
        const OTHER_USER = {{ other_user | tojson }};
        const CHAT_HISTORY = {{ messages | tojson }};
        const CURRENT_USER_PIC = {{ current_user_pic | tojson }};
        const OTHER_USER_PIC = {{ other_user_pic | tojson }};
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
    <script src="{{ url_for('static', filename='js/call.js') }}"></script>
</body>
</html>
