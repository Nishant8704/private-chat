services:
  - type: web
    name: private-chat
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python database/init_db.py
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONIOENCODING
        value: utf-8
